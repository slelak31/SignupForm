<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class = "main-content">

        <div class = "main-hero">
            <div class = "hero-logo">
                <img src="images\—Pngtree—minimalist boarding pass pass icon_21524032.png" alt="boarding pass tickets image">
                <p>Adventure</p> <!-- add absolute positioning to position text and photo on top of image-->
            </div>
            <div class = "hero-img">
            <img src="images\peter-thomas-SdLnGF8u57c-unsplashcropped.jpg" alt="background image of mount fuji">
            </div>

        </div>

        <div class = "main-Signup">

            <div class = "intro-text">

            <h3>This is not a real online service! You know you need something 
                like this in your life to help you realize your deepest dreams. 
                Sign up now to get started
            </h3>
            </div>

            <div class="intro-subtext">
            <h3>
                You know you want to.    
            </h3>
            </div>

            <form action="" method="post">
                <label for="fname">First name</label>
                <input type="text" id="fname" name="fname">

                <label for="lname">Last name</label>
                <input type="text" id="lname" name="lname">

                <label for="email">Email</label>
                <input type="text" id="email" name="email">

                <label for="phonenumber">Phone number</label>
                <input type="text" id="phonenumber" name="phonenumber">

                <label for="password">Password</label>
                <input type="text" id="password" name="password">

                <label for="confirmpassword">Confirm password</label>
                <input type="text" id="confirmpassword" name="confirmpassword">
                
            </form>

            <button>Create Account</button>

            <p>Already have an account? <a href="">Log in</a></p>

        </div>

    </div>
</body>
</html>
